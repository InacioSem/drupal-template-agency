name: DrupalForge Business Base
description: 'Base recipe for DrupalForge Business template. Configures content types, views, roles, and permissions.'
type: Site

install:
  # Core modules
  - block_content
  - content_translation
  - layout_builder
  - layout_discovery
  - media
  - media_library
  - menu_ui
  - path
  - responsive_image
  - taxonomy
  - views
  - views_ui

  # Contributed modules
  - admin_toolbar
  - admin_toolbar_tools
  - better_exposed_filters
  - config_split
  - entity_usage
  - eu_cookie_compliance
  - field_group
  - focal_point
  - gin
  - gin_toolbar
  - honeypot
  - linkit
  - metatag
  - paragraphs
  - pathauto
  - redirect
  - scheduler
  - schema_metatag
  - search_api
  - seckit
  - simple_sitemap
  - slick
  - slick_views
  - viewsreference
  - webform

  # Custom modules
  - drupalforge_business_core
  - drupalforge_dashboard
  - drupalforge_editor

config:
  actions:
    # Set Gin as admin theme
    system.theme:
      simple_config_update:
        admin: gin

    # Configure pathauto patterns
    pathauto.pattern.content:
      simple_config_update:
        id: content
        label: 'Content'
        type: 'canonical_entities:node'
        pattern: '[node:content-type:machine-name]/[node:title]'
        status: true

    # Configure honeypot
    honeypot.settings:
      simple_config_update:
        protect_all_forms: true
        time_limit: 5

    # Configure seckit
    seckit.settings:
      simple_config_update:
        seckit_xss.csp.checkbox: true
        seckit_clickjacking.x_frame: SAMEORIGIN
