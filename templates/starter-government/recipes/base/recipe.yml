name: DrupalForge Government Base
description: 'Base recipe for DrupalForge Government template. Configures content types, moderation workflows, views, roles, and permissions.'
type: Site

install:
  # Core modules
  - block_content
  - content_moderation
  - content_translation
  - layout_builder
  - layout_discovery
  - media
  - media_library
  - menu_ui
  - path
  - responsive_image
  - taxonomy
  - views
  - views_ui
  - workflows

  # Contributed modules
  - admin_toolbar
  - admin_toolbar_tools
  - alert_banner
  - config_split
  - easy_breadcrumb
  - editoria11y
  - entity_usage
  - eu_cookie_compliance
  - field_group
  - focal_point
  - gin
  - gin_toolbar
  - group
  - honeypot
  - linkit
  - metatag
  - paragraphs
  - pathauto
  - redirect
  - scheduler
  - seckit
  - simple_sitemap
  - toc_api
  - toc_js
  - webform

  # Custom module
  - drupalforge_government_core

config:
  actions:
    # Set Gin as admin theme
    system.theme:
      simple_config_update:
        admin: gin

    # Configure pathauto patterns
    pathauto.pattern.content:
      simple_config_update:
        id: content
        label: 'Content'
        type: 'canonical_entities:node'
        pattern: '[node:content-type:machine-name]/[node:title]'
        status: true

    # Configure honeypot
    honeypot.settings:
      simple_config_update:
        protect_all_forms: true
        time_limit: 5

    # Configure seckit with strict headers
    seckit.settings:
      simple_config_update:
        seckit_xss.csp.checkbox: true
        seckit_clickjacking.x_frame: SAMEORIGIN
        seckit_ssl.hsts: true
        seckit_ssl.hsts_max_age: 31536000
        seckit_ssl.hsts_subdomains: true

    # Content moderation workflow
    workflows.workflow.editorial:
      simple_config_update:
        id: editorial
        label: 'Government Editorial'
        type: content_moderation
